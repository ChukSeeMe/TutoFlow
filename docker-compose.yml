version: "3.9"

services:
  db:
    image: postgres:16-alpine
    container_name: tutorflow_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tutorflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tutorflow_dev}
      POSTGRES_DB: ${POSTGRES_DB:-tutorflow_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tutorflow}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tutorflow_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tutorflow}:${POSTGRES_PASSWORD:-tutorflow_dev}@db:5432/${POSTGRES_DB:-tutorflow_db}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - reports_storage:/app/reports
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    image: node:22-alpine
    container_name: tutorflow_web
    working_dir: /app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: /api/backend
      BACKEND_INTERNAL_URL: http://backend:8000
      WATCHPACK_POLLING: "true"
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: 21baa0aff92ca6f65828914d048d8381cefd1ea974f577f7e40cafe4e7c065d5
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      AZURE_AD_CLIENT_ID: ${AZURE_AD_CLIENT_ID:-}
      AZURE_AD_CLIENT_SECRET: ${AZURE_AD_CLIENT_SECRET:-}
      AZURE_AD_TENANT_ID: ${AZURE_AD_TENANT_ID:-common}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "rm -rf /app/.next && npm install --legacy-peer-deps && npm run dev"

volumes:
  postgres_data:
  reports_storage:
