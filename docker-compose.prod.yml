version: "3.9"

# ── Production Docker Compose ────────────────────────────────────────────────
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Before first run:
#   1. Copy .env.example → .env and fill in all values
#   2. Place TLS certificates in ./nginx/ssl/fullchain.pem and ./nginx/ssl/privkey.pem
#      (e.g. from Let's Encrypt via certbot)
#   3. docker compose -f docker-compose.prod.yml run --rm backend alembic upgrade head
#   4. docker compose -f docker-compose.prod.yml run --rm backend python scripts/seed.py

services:
  db:
    image: postgres:16-alpine
    container_name: tutorflow_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # NOT exposed externally in production
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tutorflow_api_prod
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      ENVIRONMENT: production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - reports_storage:/app/reports
    # No --reload in production; no port exposed externally (Nginx proxies)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tutorflow_web_prod
    restart: always
    env_file:
      - .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${APP_BASE_URL}/api
    depends_on:
      - backend
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: tutorflow_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - internal
      - external

volumes:
  postgres_data:
  reports_storage:

networks:
  internal:
    driver: bridge
    internal: true
  external:
    driver: bridge
