upstream tutorflow_api {
    server backend:8000;
    keepalive 32;
}

upstream tutorflow_web {
    server frontend:3000;
    keepalive 32;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name _;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"                                       always;
    add_header X-Frame-Options           "SAMEORIGIN"                                    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;"
        always;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # ── API proxy ─────────────────────────────────────────────────────────────
    location /api/ {
        # Strip /api prefix — backend routes don't include it
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass         http://tutorflow_api;
        proxy_http_version 1.1;
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Larger timeouts for AI generation endpoints
        proxy_read_timeout  120s;
        proxy_send_timeout  120s;
        proxy_connect_timeout 10s;

        # Upload size limit (report PDFs etc.)
        client_max_body_size 10M;
    }

    # ── Health check (direct, no auth) ────────────────────────────────────────
    location /health {
        proxy_pass http://tutorflow_api/health;
        access_log off;
    }

    # ── Next.js frontend ──────────────────────────────────────────────────────
    location / {
        proxy_pass         http://tutorflow_web;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # ── Static Next.js assets (long cache) ───────────────────────────────────
    location /_next/static/ {
        proxy_pass http://tutorflow_web;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }
}
