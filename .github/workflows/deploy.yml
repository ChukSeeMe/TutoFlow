name: Deploy to Azure

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".github/workflows/ci.yml"

env:
  RESOURCE_GROUP: tutorflow-rg
  BACKEND_APP: tutorflow-backend
  FRONTEND_APP: tutorflow-frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    name: "Build & Deploy"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set lowercase image names
        run: |
          echo "IMAGE_BACKEND=${{ secrets.REGISTRY_LOGIN_SERVER }}/tutorflow-backend" >> $GITHUB_ENV
          echo "IMAGE_FRONTEND=${{ secrets.REGISTRY_LOGIN_SERVER }}/tutorflow-frontend" >> $GITHUB_ENV

      - name: Login to ACR
        uses: docker/login-action@v3.4.0
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.IMAGE_BACKEND }}:latest
          platforms: linux/amd64

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ env.IMAGE_FRONTEND }}:latest
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_URL=/api/backend

      - name: Login to Azure
        uses: azure/login@v2.3.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update backend Container App
        run: |
          az containerapp update \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.BACKEND_APP }} \
            --image ${{ env.IMAGE_BACKEND }}:latest \
            --set-env-vars \
              "SECRET_KEY=${{ secrets.SECRET_KEY }}" \
              "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
              "UNSPLASH_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}" \
              "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"

      - name: Get frontend FQDN
        id: fqdn
        run: |
          URL=$(az containerapp show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.FRONTEND_APP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "url=https://$URL" >> $GITHUB_OUTPUT
          echo "Frontend URL: https://$URL"

      - name: Update frontend Container App
        run: |
          az containerapp update \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.FRONTEND_APP }} \
            --image ${{ env.IMAGE_FRONTEND }}:latest \
            --set-env-vars \
              "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" \
              "NEXTAUTH_URL=${{ steps.fqdn.outputs.url }}" \
              "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
              "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              "AZURE_AD_CLIENT_ID=${{ secrets.AZURE_AD_CLIENT_ID }}" \
              "AZURE_AD_CLIENT_SECRET=${{ secrets.AZURE_AD_CLIENT_SECRET }}" \
              "AZURE_AD_TENANT_ID=${{ secrets.AZURE_AD_TENANT_ID }}" \
              "BACKEND_INTERNAL_URL=http://tutorflow-backend"

      - name: Get live URL
        run: |
          echo "Live URL: ${{ steps.fqdn.outputs.url }}"
