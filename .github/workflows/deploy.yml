name: Deploy to Azure

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".github/workflows/ci.yml"

env:
  RESOURCE_GROUP: tutorflow-rg
  BACKEND_APP: tutorflow-backend
  FRONTEND_APP: tutorflow-frontend
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    name: "Build & Deploy"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set image names with SHA tag
        run: |
          SHA="${{ github.sha }}"
          SHORT="${SHA::8}"
          REG="${{ secrets.REGISTRY_LOGIN_SERVER }}"
          echo "IMAGE_BACKEND=${REG}/tutorflow-backend:${SHORT}" >> $GITHUB_ENV
          echo "IMAGE_FRONTEND=${REG}/tutorflow-frontend:${SHORT}" >> $GITHUB_ENV
          echo "IMAGE_BACKEND_LATEST=${REG}/tutorflow-backend:latest" >> $GITHUB_ENV
          echo "IMAGE_FRONTEND_LATEST=${REG}/tutorflow-frontend:latest" >> $GITHUB_ENV

      - name: Free up runner disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Login to ACR
        uses: docker/login-action@v3.4.0
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}
            ${{ env.IMAGE_BACKEND_LATEST }}
          platforms: linux/amd64
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Set up Node.js for frontend build
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Build Next.js on runner
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: /api/backend
          NODE_ENV: production
        run: npm run build

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.ci
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}
            ${{ env.IMAGE_FRONTEND_LATEST }}
          platforms: linux/amd64
          cache-from: type=gha,scope=frontend-image
          cache-to: type=gha,mode=max,scope=frontend-image

      - name: Install Azure CLI
        run: curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Login to Azure
        uses: azure/login@v2.3.0
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Update backend Container App
        run: |
          az containerapp update \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.BACKEND_APP }} \
            --image ${{ env.IMAGE_BACKEND }} \
            --set-env-vars \
              "SECRET_KEY=${{ secrets.SECRET_KEY }}" \
              "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" \
              "UNSPLASH_ACCESS_KEY=${{ secrets.UNSPLASH_ACCESS_KEY }}" \
              "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}"

      - name: Get frontend FQDN
        id: fqdn
        run: |
          URL=$(az containerapp show \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.FRONTEND_APP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "url=https://$URL" >> $GITHUB_OUTPUT
          echo "Frontend URL: https://$URL"

      - name: Update frontend Container App
        run: |
          az containerapp update \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --name ${{ env.FRONTEND_APP }} \
            --image ${{ env.IMAGE_FRONTEND }} \
            --set-env-vars \
              "NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}" \
              "NEXTAUTH_URL=${{ steps.fqdn.outputs.url }}" \
              "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" \
              "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" \
              "AZURE_AD_CLIENT_ID=${{ secrets.AZURE_AD_CLIENT_ID }}" \
              "AZURE_AD_CLIENT_SECRET=${{ secrets.AZURE_AD_CLIENT_SECRET }}" \
              "AZURE_AD_TENANT_ID=${{ secrets.AZURE_AD_TENANT_ID }}" \
              "BACKEND_INTERNAL_URL=https://tutorflow-backend.whitesea-c505a8c9.uksouth.azurecontainerapps.io"

      - name: Get live URL
        run: |
          echo "Live URL: ${{ steps.fqdn.outputs.url }}"
